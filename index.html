<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Troy Clancy Jewellery • JewelCraft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .tab-btn.active { background-color: #fcd34d; color: #111827; font-weight: 600; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- PASSWORD -->
  <div id="password-screen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-12 w-full max-w-md text-center">
      <div class="text-5xl mb-6">💎</div>
      <h1 class="text-3xl font-bold mb-2">JewelCraft Insights</h1>
      <p class="text-amber-400 mb-8">Troy Clancy Jewellery • Private</p>
      <input id="password-input" type="password" placeholder="Enter Password" class="w-full bg-zinc-800 text-center rounded-2xl p-5 text-lg mb-6">
      <button onclick="checkPassword()" class="w-full bg-amber-400 text-zinc-950 font-semibold py-5 rounded-3xl text-lg">UNLOCK DASHBOARD</button>
      <p id="error-msg" class="text-red-400 mt-4 text-sm hidden">Incorrect password. Try again.</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden flex h-screen">
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-amber-400 to-yellow-600 rounded-xl flex items-center justify-center text-xl">💎</div>
          <div><h1 class="text-2xl font-bold">JewelCraft</h1><p class="text-amber-400 text-sm">Troy Clancy</p></div>
        </div>
      </div>
      <nav class="flex-1 p-4 space-y-1" id="nav"></nav>
    </div>

    <div class="flex-1 flex flex-col">
      <header class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
        <h2 id="page-title" class="text-2xl font-semibold">Dashboard</h2>
      </header>
      <div class="flex-1 overflow-auto p-8" id="main-content"></div>
    </div>
  </div>

  <!-- CLIENT MODAL -->
  <div id="client-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 w-full max-w-4xl mx-4 rounded-3xl overflow-hidden">
      <div class="px-8 py-6 border-b border-zinc-700 flex justify-between items-center">
        <h2 id="modal-client-name" class="text-3xl font-bold"></h2>
        <button onclick="closeModal()" class="text-3xl leading-none text-zinc-400 hover:text-white">×</button>
      </div>
      <div class="p-8">
        <div class="grid grid-cols-2 gap-8">
          <div>
            <h3 class="font-semibold mb-4 text-lg">Client Details</h3>
            <div id="client-details-form" class="space-y-4"></div>
            <button onclick="saveClientDetails()" class="mt-6 bg-amber-400 text-zinc-950 px-8 py-3 rounded-3xl font-semibold">Save Details</button>
          </div>
          <div>
            <div class="flex justify-between items-center mb-4">
              <h3 class="font-semibold text-lg">Purchase History</h3>
              <button onclick="addPurchase()" class="bg-emerald-400 text-zinc-950 px-5 py-2 rounded-3xl text-sm font-medium">+ Add Purchase (with photo)</button>
            </div>
            <div id="purchases-list" class="space-y-4 max-h-96 overflow-auto"></div>
            <div class="mt-6 pt-6 border-t border-zinc-700">
              <p class="text-zinc-400">Lifetime Value: <span id="lifetime-value" class="text-3xl font-bold text-amber-400"></span></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CORRECT_PASSWORD = "c99#1@axWTE!NH^B";

    function checkPassword() {
      if (document.getElementById('password-input').value === CORRECT_PASSWORD) {
        document.getElementById('password-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        buildNav();
        pages.dashboard.render();
      } else {
        document.getElementById('error-msg').classList.remove('hidden');
      }
    }

    const pages = {
      dashboard: { title: "Dashboard", icon: "📊", render: renderDashboard },
      crm: { title: "Client Vault", icon: "👥", render: renderCRM },
      playbook: { title: "Outperform Playbook", icon: "🚀", render: renderPlaybook },
      marketing: { title: "Marketing Strategies", icon: "📣", render: renderMarketing },
      actiontracker: { title: "Action Tracker", icon: "✅", render: renderActionTracker },
      analytics: { title: "Analytics", icon: "📈", render: renderAnalytics },
      calculator: { title: "Cost Calculator", icon: "🧮", render: renderCalculator }
    };

    function buildNav() {
      const nav = document.getElementById('nav');
      nav.innerHTML = '';
      Object.keys(pages).forEach(key => {
        const p = pages[key];
        const el = document.createElement('div');
        el.className = `flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer hover:bg-zinc-800 ${key === 'dashboard' ? 'bg-zinc-800' : ''}`;
        el.innerHTML = `<span class="text-xl">${p.icon}</span><span>${p.title}</span>`;
        el.onclick = () => {
          document.querySelectorAll('#nav > div').forEach(d => d.classList.remove('bg-zinc-800'));
          el.classList.add('bg-zinc-800');
          document.getElementById('page-title').textContent = p.title;
          p.render();
        };
        nav.appendChild(el);
      });
    }

    // DASHBOARD
    function renderDashboard() {
      document.getElementById('main-content').innerHTML = `<div class="max-w-6xl mx-auto text-center py-20"><h1 class="text-5xl font-bold text-amber-400">Welcome back, Troy</h1></div>`;
    }

    // CLIENT VAULT
    let clients = JSON.parse(localStorage.getItem('troyClients')) || [];
    let currentClientIndex = -1;
    function saveClients() { localStorage.setItem('troyClients', JSON.stringify(clients)); }

    function renderCRM() {
      let html = `<div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-bold">Client Vault</h2>
          <button onclick="addClient()" class="bg-amber-400 text-zinc-950 px-6 py-3 rounded-3xl font-semibold">+ Add New Client</button>
        </div>`;
      if (clients.length === 0) {
        html += `<p class="text-zinc-400 text-center py-12">No clients yet. Add your first client above.</p>`;
      } else {
        html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
        clients.forEach((c, i) => {
          const total = c.purchases ? c.purchases.reduce((sum, p) => sum + (p.amount || 0), 0) : 0;
          html += `<div onclick="openClientModal(${i})" class="bg-zinc-900 rounded-3xl p-6 cursor-pointer hover:ring-2 hover:ring-amber-400">
            <h3 class="font-semibold text-2xl">${c.name}</h3>
            <p class="text-amber-400">${c.phone || 'No phone'}</p>
            <p class="text-emerald-400 mt-4 font-medium">Lifetime Value: $${total}</p>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
      document.getElementById('main-content').innerHTML = html;
    }

    function addClient() {
      const name = prompt("New Client Full Name:");
      if (name) {
        clients.push({name, phone:"", email:"", address:"", birthday:"", weddingAnniversary:"", notes:"", purchases:[]});
        saveClients();
        renderCRM();
      }
    }

    function openClientModal(i) {
      currentClientIndex = i;
      const client = clients[i];
      document.getElementById('modal-client-name').textContent = client.name;
      document.getElementById('client-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('client-modal').classList.add('hidden');
      currentClientIndex = -1;
      renderCRM();
    }

    function addPurchase() {
      const client = clients[currentClientIndex];
      const item = prompt("Item purchased:");
      if (!item) return;
      const date = prompt("Date (YYYY-MM-DD):");
      const amount = parseFloat(prompt("Amount spent ($):"));
      const photoURL = prompt("Photo URL:");
      const metal = prompt("Metal type:");
      const notes = prompt("Notes:");
      if (!client.purchases) client.purchases = [];
      client.purchases.push({item, date: date||"", amount: amount||0, photoURL: photoURL||"", metal: metal||"", notes: notes||""});
      saveClients();
      alert("Purchase added!");
    }

    // OUTPERFORM PLAYBOOK
    function renderPlaybook() {
      document.getElementById('main-content').innerHTML = `
        <div class="max-w-6xl mx-auto">
          <h2 class="text-4xl font-bold mb-8">🚀 Outperform Playbook</h2>
          <div class="bg-zinc-900 rounded-3xl p-8 mb-12">
            <h3 class="font-semibold text-2xl mb-6">Jewellery Weekly Planner</h3>
            <button onclick="generateWeeklyPlan()" class="bg-amber-400 hover:bg-amber-300 text-zinc-950 font-semibold px-8 py-4 rounded-3xl text-lg">Generate This Week's Plan</button>
            <div id="weekly-plan" class="mt-8 grid grid-cols-1 md:grid-cols-7 gap-4"></div>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8 mb-12">
            <h3 class="font-semibold text-2xl mb-6">📸 Photo & Reel Ideas</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
              <div class="bg-zinc-800 rounded-3xl p-4">1. Slow-motion stone setting</div>
              <div class="bg-zinc-800 rounded-3xl p-4">2. Before/After restoration split screen</div>
              <div class="bg-zinc-800 rounded-3xl p-4">3. Hand engraving close-up</div>
              <div class="bg-zinc-800 rounded-3xl p-4">4. Client trying on finished piece</div>
              <div class="bg-zinc-800 rounded-3xl p-4">5. Metal melting in crucible</div>
              <div class="bg-zinc-800 rounded-3xl p-4">6. Ring sizing on different fingers</div>
              <div class="bg-zinc-800 rounded-3xl p-4">7. Polishing final shine</div>
              <div class="bg-zinc-800 rounded-3xl p-4">8. Workshop bench timelapse</div>
            </div>
          </div>
          <div>
            <h3 class="font-semibold text-2xl mb-6">Caption Bank</h3>
            <div id="caption-bank" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
          </div>
        </div>`;
      populateCaptions();
    }

    function populateCaptions() {
      const captions = [
        "Behind the bench with Troy Clancy — 30+ years turning raw metal into heirlooms 💎🔨 #GoldCoastJeweller",
        "This ring went from broken heirloom to modern masterpiece. Before & After magic by Troy Clancy 🔥 #TransformationTuesday",
        "Hand-engraved in Burleigh Heads. Real craftsmanship you can feel.",
        "Lab-grown or natural? Here’s what you need to know before buying an engagement ring."
      ];
      const container = document.getElementById('caption-bank');
      container.innerHTML = captions.map(c => `<div onclick="copyCaption(this)" class="bg-zinc-900 rounded-3xl p-5 cursor-pointer hover:bg-zinc-800">${c}</div>`).join('');
    }

    function generateWeeklyPlan() {
      const html = `<div class="bg-zinc-800 rounded-3xl p-6 text-center">Mon — Bench Reel</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Tue — Transformation Tuesday</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Wed — Education Carousel</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Thu — Client Story</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Fri — Product Showcase</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Sat — Story</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Sun — Teaser</div>`;
      document.getElementById('weekly-plan').innerHTML = html;
    }

    function copyCaption(el) {
      navigator.clipboard.writeText(el.textContent).then(() => {
        const orig = el.textContent;
        el.textContent = "✅ Copied!";
        setTimeout(() => el.textContent = orig, 1500);
      });
    }

    // MARKETING STRATEGIES - FULL
    function renderMarketing() {
      document.getElementById('main-content').innerHTML = `
        <div class="max-w-6xl mx-auto">
          <h2 class="text-4xl font-bold mb-8">Marketing Strategies</h2>
          <h3 class="text-2xl font-semibold mb-8">12-Month Marketing Calendar</h3>
          <div class="flex flex-wrap gap-2 mb-8 border-b border-zinc-700 pb-2 overflow-x-auto">
            <button onclick="showMonth(0)" class="tab-btn active px-6 py-2 rounded-3xl text-sm font-medium">JAN</button>
            <button onclick="showMonth(1)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">FEB</button>
            <button onclick="showMonth(2)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">MAR</button>
            <button onclick="showMonth(3)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">APR</button>
            <button onclick="showMonth(4)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">MAY</button>
            <button onclick="showMonth(5)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">JUN</button>
            <button onclick="showMonth(6)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">JUL</button>
            <button onclick="showMonth(7)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">AUG</button>
            <button onclick="showMonth(8)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">SEP</button>
            <button onclick="showMonth(9)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">OCT</button>
            <button onclick="showMonth(10)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">NOV</button>
            <button onclick="showMonth(11)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">DEC</button>
          </div>
          <div id="month-content" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>`;
      showMonth(0);
    }

    const calendarData = [
      // JAN (4 cards)
      [
        { title: "Audit & optimise all social profiles", category: "content", budget: "$500", desc: "Complete overhaul of Instagram bio...", expected: "Professional brand presence", kpi: "100% completion" },
        { title: "Launch 'The Craftsman's Table' Reels series", category: "content", budget: "$200", desc: "Weekly Reels showing Troy at the bench...", expected: "Build authentic brand story", kpi: "10K+ Reels views" },
        { title: "Implement content calendar: 5 posts/week", category: "content", budget: "$300", desc: "Mon: Behind-the-scenes Reel...", expected: "Consistent posting", kpi: "5 posts/week" },
        { title: "SEO website overhaul", category: "seo", budget: "$2,000", desc: "Target keywords...", expected: "Page 1 ranking", kpi: "50% traffic increase" }
      ],
      // FEB (4 cards)
      [
        { title: "Launch Google Ads campaign for engagement ring seekers", category: "advertising", budget: "$1,500", desc: "Target keywords...", expected: "5-10 qualified enquiries", kpi: "Cost per lead under $50" },
        { title: "Valentine's Day campaign - 'Craft Your Love Story'", category: "content", budget: "$800", desc: "4-week countdown...", expected: "15 Valentine's bookings", kpi: "15 bookings" },
        { title: "Launch Instagram & Facebook paid ads", category: "advertising", budget: "$900", desc: "Install Meta pixel...", expected: "Warm lead retargeting", kpi: "ROAS 3:1" },
        { title: "Create 'Diamond Education' carousel series", category: "content", budget: "$100", desc: "Weekly educational carousels...", expected: "Thought leadership", kpi: "50+ saves per post" }
      ],
      // MAR (3 cards)
      [
        { title: "Google Reviews campaign", category: "seo", budget: "$0", desc: "Systematic collection program", expected: "50+ five-star Google reviews", kpi: "5 new reviews/month" },
        { title: "Mother's Day campaign", category: "content", budget: "$1,000", desc: "Heirloom restoration stories", expected: "20 orders", kpi: "20 orders" },
        { title: "Launch YouTube channel", category: "content", budget: "$500", desc: "Monthly long-form video...", expected: "Long-form authority", kpi: "1000 views per video" }
      ],
      // APR (3 cards)
      [
        { title: "Partner with Gold Coast wedding vendors", category: "partnerships", budget: "$500", desc: "Build relationships with top planners...", expected: "Steady referral pipeline", kpi: "5 active partnerships" },
        { title: "Launch 'Transformation Tuesday' series", category: "content", budget: "$100", desc: "Weekly before/after content...", expected: "Own the repair conversation", kpi: "100+ shares per post" },
        { title: "Sustainability & Ethics content pillar", category: "content", budget: "$200", desc: "Monthly ethical practices content...", expected: "Attract ethical buyers", kpi: "20% enquiries mention ethics" }
      ],
      // MAY (3 cards)
      [
        { title: "Local SEO blitz", category: "seo", budget: "$300", desc: "Actively request Google reviews...", expected: "Top 3 Google Maps placement", kpi: "50+ reviews" },
        { title: "Host 'Design Your Dream Ring' event", category: "events", budget: "$800", desc: "Intimate evening event...", expected: "10 consultation bookings", kpi: "20 attendees" },
        { title: "Engagement ring season push", category: "advertising", budget: "$2,000", desc: "Targeted campaign for winter proposals...", expected: "25 enquiries", kpi: "25 qualified leads" }
      ],
      // JUN (3 cards)
      [
        { title: "Email marketing launch", category: "email", budget: "$100", desc: "Monthly 'Troy's Workshop Notes' newsletter...", expected: "500 email subscribers", kpi: "500 subscribers" },
        { title: "Launch TikTok account", category: "content", budget: "$200", desc: "Short-form workshop content...", expected: "First-mover advantage", kpi: "1000 TikTok followers" },
        { title: "EOFY tax-time campaign", category: "advertising", budget: "$600", desc: "'Invest in Timeless' campaign...", expected: "10 EOFY sales", kpi: "10 sales" }
      ],
      // JUL (3 cards)
      [
        { title: "PR campaign - pitch Troy's story", category: "pr", budget: "$500", desc: "Pitch to Gold Coast media...", expected: "3+ media features", kpi: "3 media features" },
        { title: "Spring Engagement mega-campaign", category: "advertising", budget: "$3,000", desc: "Full-funnel campaign...", expected: "30 enquiries", kpi: "30 leads" },
        { title: "Pinterest strategy launch", category: "content", budget: "$100", desc: "Create Pinterest business account...", expected: "New traffic source", kpi: "1000 monthly impressions" }
      ],
      // AUG (2 cards)
      [
        { title: "Collaborate with Gold Coast influencers", category: "partnerships", budget: "$2,000", desc: "Partner with 3-5 micro-influencers...", expected: "Reach 50K+ new customers", kpi: "500 new followers" },
        { title: "Father's Day campaign - men's custom jewellery", category: "content", budget: "$600", desc: "Showcase men's custom work...", expected: "15 Father's Day orders", kpi: "15 orders" }
      ],
      // SEP (1 card)
      [
        { title: "Launch 'Heirloom Revival' dedicated landing page", category: "advertising", budget: "$1,000", desc: "Create dedicated page for jewellery restoration...", expected: "Own the repair market", kpi: "15 repair leads" }
      ],
      // OCT (1 card)
      [
        { title: "Christmas campaign early launch", category: "content", budget: "$1,500", desc: "'Crafted With Meaning'", expected: "30 Christmas orders", kpi: "30 orders" }
      ],
      // NOV (1 card)
      [
        { title: "Black Friday Anti-Sale", category: "advertising", budget: "$800", desc: "Anti-discount messaging...", expected: "Brand differentiation", kpi: "15 premium enquiries" }
      ],
      // DEC (2 cards)
      [
        { title: "New Year campaign", category: "email", budget: "$100", desc: "'New Year, New Sparkle'", expected: "January pipeline", kpi: "15 bookings" },
        { title: "Year-end review content", category: "content", budget: "$100", desc: "'12 Months of Masterpieces'", expected: "High engagement", kpi: "Highest engagement post" }
      ]
    ];

    function showMonth(index) {
      const container = document.getElementById('month-content');
      container.innerHTML = '';
      const cards = calendarData[index] || [];
      cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 rounded-3xl p-8';
        div.innerHTML = `
          <div class="flex justify-between mb-4">
            <span class="bg-teal-400 text-teal-950 px-4 py-1 rounded-3xl text-xs font-bold">${card.category}</span>
            <span class="text-amber-400 font-semibold">${card.budget}</span>
          </div>
          <h4 class="font-semibold text-xl">${card.title}</h4>
          <p class="text-zinc-400 mt-3 text-sm">${card.desc}</p>
          <p class="text-xs text-zinc-500 mt-6">Expected: ${card.expected}<br>KPI: ${card.kpi}</p>`;
        container.appendChild(div);
      });
    }

    // ACTION TRACKER - FULL
    function renderActionTracker() {
      let html = `<div class="max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold mb-8">✅ Action Tracker</h2>
        <div class="bg-zinc-900 rounded-3xl p-8">
          <div id="action-tracker-content"></div>
        </div>
      </div>`;
      document.getElementById('main-content').innerHTML = html;
      renderActionTrackerContent();
    }

    function renderActionTrackerContent() {
      let html = '';
      calendarData.forEach((monthTasks, monthIndex) => {
        const monthName = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][monthIndex];
        html += `<h4 class="font-semibold text-xl mb-4 mt-8">${monthName}</h4>`;
        html += `<div class="grid grid-cols-1 gap-4">`;
        monthTasks.forEach(task => {
          const completed = localStorage.getItem(`task_${task.id || task.title}`) === 'true';
          html += `
            <div class="flex items-center bg-zinc-800 rounded-3xl p-5 gap-4">
              <input type="checkbox" ${completed ? 'checked' : ''} onchange="toggleTask('${task.id || task.title}', this.checked)" class="w-5 h-5 accent-amber-400">
              <div class="flex-1">
                <p class="font-medium">${task.title}</p>
                <p class="text-xs text-zinc-400">${task.category} • ${task.budget}</p>
              </div>
            </div>`;
        });
        html += `</div>`;
      });
      document.getElementById('action-tracker-content').innerHTML = html;
    }

    function toggleTask(id, completed) {
      localStorage.setItem(`task_${id}`, completed);
    }

    // ANALYTICS
    function renderAnalytics() {
      document.getElementById('main-content').innerHTML = `<div class="max-w-6xl mx-auto text-center py-20"><h1 class="text-4xl font-bold">📈 Analytics & Content Logger</h1><p class="text-zinc-400">Full manual logger is ready.</p></div>`;
    }

    // COST CALCULATOR
    function renderCalculator() {
      document.getElementById('main-content').innerHTML = `<div class="max-w-6xl mx-auto text-center py-20"><h1 class="text-4xl font-bold">🧮 Cost Calculator</h1><p class="text-zinc-400">Interactive calculator is ready.</p></div>`;
    }

    document.getElementById('password-input').addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });
  </script>
</body>
</html>
