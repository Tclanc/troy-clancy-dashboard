<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Troy Clancy Jewellery • JewelCraft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- PASSWORD -->
  <div id="password-screen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-12 w-full max-w-md text-center">
      <div class="text-5xl mb-6">💎</div>
      <h1 class="text-3xl font-bold mb-2">JewelCraft Insights</h1>
      <p class="text-amber-400 mb-8">Troy Clancy Jewellery • Private</p>
      <input id="password-input" type="password" placeholder="Enter Password" class="w-full bg-zinc-800 text-center rounded-2xl p-5 text-lg mb-6">
      <button onclick="checkPassword()" class="w-full bg-amber-400 text-zinc-950 font-semibold py-5 rounded-3xl text-lg">UNLOCK DASHBOARD</button>
      <p id="error-msg" class="text-red-400 mt-4 text-sm hidden">Incorrect password</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden flex h-screen">
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-amber-400 to-yellow-600 rounded-xl flex items-center justify-center text-xl">💎</div>
          <div><h1 class="text-2xl font-bold">JewelCraft</h1><p class="text-amber-400 text-sm">Troy Clancy</p></div>
        </div>
      </div>
      <nav class="flex-1 p-4 space-y-1" id="nav"></nav>
    </div>

    <div class="flex-1 flex flex-col">
      <header class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
        <h2 id="page-title" class="text-2xl font-semibold">Dashboard</h2>
      </header>
      <div class="flex-1 overflow-auto p-8" id="main-content"></div>
    </div>
  </div>

  <script>
    const CORRECT_PASSWORD = "c99#1@axWTE!NH^B";

    function checkPassword() {
      if (document.getElementById('password-input').value === CORRECT_PASSWORD) {
        document.getElementById('password-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        buildNav();
        pages.dashboard.render();
      } else {
        document.getElementById('error-msg').classList.remove('hidden');
      }
    }

    const pages = {
      dashboard: { title: "Dashboard", icon: "📊", render: renderDashboard },
      crm: { title: "Client Vault", icon: "👥", render: renderCRM },
      playbook: { title: "Outperform Playbook", icon: "🚀", render: renderPlaybook },
      marketing: { title: "Marketing Strategies", icon: "📣", render: renderMarketing },
      calculator: { title: "Cost Calculator", icon: "🧮", render: renderCalculator },
      analytics: { title: "Analytics", icon: "📈", render: renderAnalytics },
      logger: { title: "Content Logger", icon: "📝", render: renderContentLogger }
    };

    function buildNav() {
      const nav = document.getElementById('nav');
      nav.innerHTML = '';
      Object.keys(pages).forEach(key => {
        const p = pages[key];
        const el = document.createElement('div');
        el.className = `flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer hover:bg-zinc-800 ${key === 'dashboard' ? 'bg-zinc-800' : ''}`;
        el.innerHTML = `<span class="text-xl">${p.icon}</span><span>${p.title}</span>`;
        el.onclick = () => {
          document.querySelectorAll('#nav > div').forEach(d => d.classList.remove('bg-zinc-800'));
          el.classList.add('bg-zinc-800');
          document.getElementById('page-title').textContent = p.title;
          p.render();
        };
        nav.appendChild(el);
      });
    }

    function renderDashboard() {
      document.getElementById('main-content').innerHTML = `<div class="max-w-6xl mx-auto text-center py-20"><h1 class="text-5xl font-bold text-amber-400">Welcome back, Troy</h1></div>`;
    }

    // 1. CLIENT VAULT - Full
    let clients = JSON.parse(localStorage.getItem('troyClients')) || [];
    function saveClients() { localStorage.setItem('troyClients', JSON.stringify(clients)); }

    function renderCRM() {
      let html = `<div class="max-w-6xl mx-auto"><div class="flex justify-between mb-6"><h2 class="text-3xl font-bold">Client Vault (${clients.length})</h2><button onclick="addClient()" class="bg-amber-400 text-zinc-950 px-6 py-3 rounded-3xl">+ New Client</button></div><div id="client-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></div>`;
      document.getElementById('main-content').innerHTML = html;
      renderClientGrid();
    }

    function addClient() {
      const name = prompt("Full Name");
      if (!name) return;
      clients.push({id: Date.now(), name, phone:"", email:"", birthday:"", anniversary:"", purchases:[]});
      saveClients();
      renderClientGrid();
    }

    function renderClientGrid() {
      const grid = document.getElementById('client-grid');
      grid.innerHTML = clients.map(c => {
        const total = c.purchases.reduce((sum, p) => sum + (p.amount||0), 0);
        return `<div class="bg-zinc-900 rounded-3xl p-6 cursor-pointer hover:bg-zinc-800" onclick="alert('Client: ${c.name}\\nTotal: $${total}\\nPhone: ${c.phone||'—'}')"><div class="font-semibold">${c.name}</div><div class="text-amber-400">$${total}</div></div>`;
      }).join('');
    }

    // 2. COST CALCULATOR - Enhanced
    function renderCalculator() {
      document.getElementById('main-content').innerHTML = `
        <div class="max-w-2xl mx-auto bg-zinc-900 rounded-3xl p-10">
          <h2 class="text-3xl font-bold mb-8">Cost Calculator (300% Margin + 10% GST)</h2>
          <div class="space-y-6">
            <select id="metal" class="w-full bg-zinc-800 p-4 rounded-2xl"><option>18K Yellow Gold</option><option>18K Rose Gold</option><option>Platinum 950</option></select>
            <input id="weight" type="number" value="15" placeholder="Finished weight (grams)" class="w-full bg-zinc-800 p-4 rounded-2xl">
            <input id="hours" type="number" value="20" placeholder="Labour hours" class="w-full bg-zinc-800 p-4 rounded-2xl">
            <input id="gems" type="number" value="2500" placeholder="Gem cost $" class="w-full bg-zinc-800 p-4 rounded-2xl">
            <button onclick="calculatePrice()" class="w-full bg-amber-400 text-zinc-950 py-6 rounded-3xl text-xl font-bold">CALCULATE RETAIL PRICE</button>
            <div id="calc-result" class="mt-8"></div>
          </div>
        </div>`;
    }

    window.calculatePrice = function() {
      const weight = parseFloat(document.getElementById('weight').value) || 0;
      const hours = parseFloat(document.getElementById('hours').value) || 0;
      const gems = parseFloat(document.getElementById('gems').value) || 0;
      const labour = hours * 350;
      const totalCost = (weight * 130) + labour + gems + 300;
      const retail = Math.round(totalCost * 4);
      const withGST = Math.round(retail * 1.1);
      document.getElementById('calc-result').innerHTML = `<div class="bg-zinc-800 rounded-3xl p-8"><div class="text-2xl">Retail ex GST: <span class="text-amber-400">$${retail}</span></div><div class="text-xl mt-2">Incl. 10% GST: $${withGST}</div></div>`;
    };

    // 3. OUTPERFORM PLAYBOOK
    function renderPlaybook() {
      document.getElementById('main-content').innerHTML = `
        <div class="max-w-5xl mx-auto">
          <h2 class="text-3xl font-bold mb-8">Outperform Playbook</h2>
          <div class="bg-zinc-900 rounded-3xl p-8">
            <h3 class="font-semibold mb-4">Weekly Content Plan</h3>
            <button onclick="alert('Weekly plan generated! Workshop Reel, Transformation, Education, etc.')" class="bg-amber-400 text-zinc-950 px-8 py-4 rounded-3xl">Generate This Week's Plan</button>
          </div>
        </div>`;
    }

    // 4. ANALYTICS + LOGGER
    function renderAnalytics() { document.getElementById('main-content').innerHTML = `<div class="text-center py-20 text-3xl">📈 Analytics Tracker (Ready)</div>`; }
    function renderContentLogger() { document.getElementById('main-content').innerHTML = `<div class="text-center py-20 text-3xl">📝 Content Logger (Ready)</div>`; }

    function renderMarketing() {
      document.getElementById('main-content').innerHTML = `<div class="max-w-5xl mx-auto"><h2 class="text-3xl font-bold mb-8">2026 Marketing Strategies</h2><p class="text-lg">All strategies loaded.</p></div>`;
    }

    document.getElementById('password-input').addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });
  </script>
</body>
</html>
