<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Troy Clancy Jewellery • JewelCraft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .tab-btn.active { background-color: #fcd34d; color: #111827; font-weight: 600; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- PASSWORD -->
  <div id="password-screen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-12 w-full max-w-md text-center">
      <div class="text-5xl mb-6">💎</div>
      <h1 class="text-3xl font-bold mb-2">JewelCraft Insights</h1>
      <p class="text-amber-400 mb-8">Troy Clancy Jewellery • Private</p>
      <input id="password-input" type="password" placeholder="Enter Password" class="w-full bg-zinc-800 text-center rounded-2xl p-5 text-lg mb-6">
      <button onclick="checkPassword()" class="w-full bg-amber-400 text-zinc-950 font-semibold py-5 rounded-3xl text-lg">UNLOCK DASHBOARD</button>
      <p id="error-msg" class="text-red-400 mt-4 text-sm hidden">Incorrect password. Try again.</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden flex h-screen">
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-amber-400 to-yellow-600 rounded-xl flex items-center justify-center text-xl">💎</div>
          <div><h1 class="text-2xl font-bold">JewelCraft</h1><p class="text-amber-400 text-sm">Troy Clancy</p></div>
        </div>
      </div>
      <nav class="flex-1 p-4 space-y-1" id="nav"></nav>
    </div>

    <div class="flex-1 flex flex-col">
      <header class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
        <h2 id="page-title" class="text-2xl font-semibold">Dashboard</h2>
      </header>
      <div class="flex-1 overflow-auto p-8" id="main-content"></div>
    </div>
  </div>

  <!-- CLIENT MODAL -->
  <div id="client-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 w-full max-w-4xl mx-4 rounded-3xl overflow-hidden">
      <div class="px-8 py-6 border-b border-zinc-700 flex justify-between items-center">
        <h2 id="modal-client-name" class="text-3xl font-bold"></h2>
        <button onclick="closeModal()" class="text-3xl leading-none text-zinc-400 hover:text-white">×</button>
      </div>
      <div class="p-8">
        <div class="grid grid-cols-2 gap-8">
          <div>
            <h3 class="font-semibold mb-4 text-lg">Client Details</h3>
            <div id="client-details-form" class="space-y-4"></div>
            <button onclick="saveClientDetails()" class="mt-6 bg-amber-400 text-zinc-950 px-8 py-3 rounded-3xl font-semibold">Save Details</button>
          </div>
          <div>
            <div class="flex justify-between items-center mb-4">
              <h3 class="font-semibold text-lg">Purchase History</h3>
              <button onclick="addPurchase()" class="bg-emerald-400 text-zinc-950 px-5 py-2 rounded-3xl text-sm font-medium">+ Add Purchase (with photo)</button>
            </div>
            <div id="purchases-list" class="space-y-4 max-h-96 overflow-auto"></div>
            <div class="mt-6 pt-6 border-t border-zinc-700">
              <p class="text-zinc-400">Lifetime Value: <span id="lifetime-value" class="text-3xl font-bold text-amber-400"></span></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CORRECT_PASSWORD = "c99#1@axWTE!NH^B";

    function checkPassword() {
      if (document.getElementById('password-input').value === CORRECT_PASSWORD) {
        document.getElementById('password-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        buildNav();
        pages.dashboard.render();
      } else {
        document.getElementById('error-msg').classList.remove('hidden');
      }
    }

    const pages = {
      dashboard: { title: "Dashboard", icon: "📊", render: renderDashboard },
      crm: { title: "Client Vault", icon: "👥", render: renderCRM },
      playbook: { title: "Outperform Playbook", icon: "🚀", render: renderPlaybook },
      marketing: { title: "Marketing Strategies", icon: "📣", render: renderMarketing },
      analytics: { title: "Analytics", icon: "📈", render: renderAnalytics },
      calculator: { title: "Cost Calculator", icon: "🧮", render: renderCalculator }
    };

    function buildNav() {
      const nav = document.getElementById('nav');
      nav.innerHTML = '';
      Object.keys(pages).forEach(key => {
        const p = pages[key];
        const el = document.createElement('div');
        el.className = `flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer hover:bg-zinc-800 ${key === 'dashboard' ? 'bg-zinc-800' : ''}`;
        el.innerHTML = `<span class="text-xl">${p.icon}</span><span>${p.title}</span>`;
        el.onclick = () => {
          document.querySelectorAll('#nav > div').forEach(d => d.classList.remove('bg-zinc-800'));
          el.classList.add('bg-zinc-800');
          document.getElementById('page-title').textContent = p.title;
          p.render();
        };
        nav.appendChild(el);
      });
    }

    function renderDashboard() {
      document.getElementById('main-content').innerHTML = `<div class="max-w-6xl mx-auto text-center py-20"><h1 class="text-5xl font-bold text-amber-400">Welcome back, Troy</h1></div>`;
    }

    // CLIENT VAULT
    let clients = JSON.parse(localStorage.getItem('troyClients')) || [];
    let currentClientIndex = -1;
    function saveClients() { localStorage.setItem('troyClients', JSON.stringify(clients)); }

    function renderCRM() {
      let html = `<div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-bold">Client Vault</h2>
          <button onclick="addClient()" class="bg-amber-400 text-zinc-950 px-6 py-3 rounded-3xl font-semibold">+ Add New Client</button>
        </div>`;
      if (clients.length === 0) {
        html += `<p class="text-zinc-400 text-center py-12">No clients yet. Add your first client above.</p>`;
      } else {
        html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
        clients.forEach((c, i) => {
          const total = c.purchases ? c.purchases.reduce((sum, p) => sum + (p.amount || 0), 0) : 0;
          html += `<div onclick="openClientModal(${i})" class="bg-zinc-900 rounded-3xl p-6 cursor-pointer hover:ring-2 hover:ring-amber-400">
            <h3 class="font-semibold text-2xl">${c.name}</h3>
            <p class="text-amber-400">${c.phone || 'No phone'}</p>
            <p class="text-emerald-400 mt-4 font-medium">Lifetime Value: $${total}</p>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
      document.getElementById('main-content').innerHTML = html;
    }

    function addClient() {
      const name = prompt("New Client Full Name:");
      if (name) {
        clients.push({name, phone:"", email:"", address:"", birthday:"", weddingAnniversary:"", notes:"", purchases:[]});
        saveClients();
        renderCRM();
      }
    }

    function openClientModal(i) {
      currentClientIndex = i;
      const client = clients[i];
      document.getElementById('modal-client-name').textContent = client.name;
      let detailsHTML = `
        <div class="grid grid-cols-2 gap-4">
          <div><label class="text-xs text-zinc-400">Phone</label><input id="modal-phone" value="${client.phone || ''}" class="w-full bg-zinc-800 rounded-2xl p-3"></div>
          <div><label class="text-xs text-zinc-400">Email</label><input id="modal-email" value="${client.email || ''}" class="w-full bg-zinc-800 rounded-2xl p-3"></div>
          <div class="col-span-2"><label class="text-xs text-zinc-400">Address</label><input id="modal-address" value="${client.address || ''}" class="w-full bg-zinc-800 rounded-2xl p-3"></div>
          <div><label class="text-xs text-zinc-400">Birthday</label><input id="modal-birthday" type="date" value="${client.birthday || ''}" class="w-full bg-zinc-800 rounded-2xl p-3"></div>
          <div><label class="text-xs text-zinc-400">Wedding Anniversary</label><input id="modal-anniversary" type="date" value="${client.weddingAnniversary || ''}" class="w-full bg-zinc-800 rounded-2xl p-3"></div>
        </div>
        <div class="mt-6"><label class="text-xs text-zinc-400">Notes</label><textarea id="modal-notes" class="w-full bg-zinc-800 rounded-3xl p-4 h-24">${client.notes || ''}</textarea></div>`;
      document.getElementById('client-details-form').innerHTML = detailsHTML;
      renderPurchasesList();
      document.getElementById('client-modal').classList.remove('hidden');
    }

    function renderPurchasesList() {
      const client = clients[currentClientIndex];
      const container = document.getElementById('purchases-list');
      let html = client.purchases && client.purchases.length ? '' : `<p class="text-zinc-400 text-center py-8">No purchases yet.<br>Click "+ Add Purchase (with photo)" above.</p>`;
      if (client.purchases) {
        client.purchases.forEach((p, idx) => {
          html += `
            <div class="bg-zinc-800 rounded-3xl p-5 flex gap-5">
              ${p.photoURL ? `<img src="${p.photoURL}" class="w-20 h-20 object-cover rounded-2xl flex-shrink-0" alt="">` : `<div class="w-20 h-20 bg-zinc-700 rounded-2xl flex items-center justify-center text-3xl">💍</div>`}
              <div class="flex-1">
                <div class="flex justify-between"><h4 class="font-semibold">${p.item}</h4><span class="text-emerald-400">$${p.amount}</span></div>
                <p class="text-xs text-zinc-400">${p.date} • ${p.metal || ''}</p>
                <p class="text-sm text-zinc-300">${p.notes || ''}</p>
              </div>
              <button onclick="deletePurchase(${idx});event.stopImmediatePropagation()" class="text-red-400 text-2xl">×</button>
            </div>`;
        });
      }
      container.innerHTML = html;
      const total = client.purchases ? client.purchases.reduce((sum, p) => sum + (Number(p.amount)||0), 0) : 0;
      document.getElementById('lifetime-value').textContent = `$${total}`;
    }

    function addPurchase() {
      const client = clients[currentClientIndex];
      const item = prompt("Item purchased (e.g. Custom Engagement Ring):");
      if (!item) return;
      const date = prompt("Date (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
      const amount = parseFloat(prompt("Amount spent ($):"));
      const photoURL = prompt("Photo URL (right-click image online → Copy image address):");
      const metal = prompt("Metal type:");
      const notes = prompt("Notes:");
      if (!client.purchases) client.purchases = [];
      client.purchases.push({item, date: date||"", amount: amount||0, photoURL: photoURL||"", metal: metal||"", notes: notes||""});
      saveClients();
      renderPurchasesList();
    }

    function deletePurchase(idx) {
      if (confirm("Delete this purchase?")) {
        clients[currentClientIndex].purchases.splice(idx, 1);
        saveClients();
        renderPurchasesList();
      }
    }

    function saveClientDetails() {
      const client = clients[currentClientIndex];
      client.phone = document.getElementById('modal-phone').value;
      client.email = document.getElementById('modal-email').value;
      client.address = document.getElementById('modal-address').value;
      client.birthday = document.getElementById('modal-birthday').value;
      client.weddingAnniversary = document.getElementById('modal-anniversary').value;
      client.notes = document.getElementById('modal-notes').value;
      saveClients();
      alert("✅ Saved!");
    }

    function closeModal() {
      document.getElementById('client-modal').classList.add('hidden');
      currentClientIndex = -1;
      renderCRM();
    }

    // OUTPERFORM PLAYBOOK
    function renderPlaybook() {
      document.getElementById('main-content').innerHTML = `
        <div class="max-w-6xl mx-auto">
          <h2 class="text-4xl font-bold mb-8">🚀 Outperform Playbook</h2>
          <div class="bg-zinc-900 rounded-3xl p-8 mb-12">
            <h3 class="font-semibold text-2xl mb-6">Jewellery Weekly Planner</h3>
            <button onclick="generateWeeklyPlan()" class="bg-amber-400 hover:bg-amber-300 text-zinc-950 font-semibold px-8 py-4 rounded-3xl text-lg">Generate This Week's Plan</button>
            <div id="weekly-plan" class="mt-8 grid grid-cols-1 md:grid-cols-7 gap-4"></div>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8 mb-12">
            <h3 class="font-semibold text-2xl mb-6">📸 Photo & Reel Ideas</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
              <div class="bg-zinc-800 rounded-3xl p-4">1. Slow-motion stone setting</div>
              <div class="bg-zinc-800 rounded-3xl p-4">2. Before/After restoration split screen</div>
              <div class="bg-zinc-800 rounded-3xl p-4">3. Hand engraving close-up</div>
              <div class="bg-zinc-800 rounded-3xl p-4">4. Client trying on finished piece</div>
              <div class="bg-zinc-800 rounded-3xl p-4">5. Metal melting in crucible</div>
              <div class="bg-zinc-800 rounded-3xl p-4">6. Ring sizing on different fingers</div>
              <div class="bg-zinc-800 rounded-3xl p-4">7. Polishing final shine</div>
              <div class="bg-zinc-800 rounded-3xl p-4">8. Workshop bench timelapse</div>
            </div>
          </div>
          <div>
            <h3 class="font-semibold text-2xl mb-6">Caption Bank</h3>
            <div id="caption-bank" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
          </div>
        </div>`;
      populateCaptions();
    }

    function populateCaptions() {
      const captions = [
        "Behind the bench with Troy Clancy — 30+ years turning raw metal into heirlooms 💎🔨 #GoldCoastJeweller",
        "This ring went from broken heirloom to modern masterpiece. Before & After magic by Troy Clancy 🔥 #TransformationTuesday",
        "Hand-engraved in Burleigh Heads. Real craftsmanship you can feel.",
        "Lab-grown or natural? Here’s what you need to know before buying an engagement ring."
      ];
      const container = document.getElementById('caption-bank');
      container.innerHTML = captions.map(c => `<div onclick="copyCaption(this)" class="bg-zinc-900 rounded-3xl p-5 cursor-pointer hover:bg-zinc-800">${c}</div>`).join('');
    }

    function generateWeeklyPlan() {
      const html = `<div class="bg-zinc-800 rounded-3xl p-6 text-center">Mon — Bench Reel (stone setting)</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Tue — Transformation Tuesday</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Wed — Education Carousel</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Thu — Client Story</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Fri — Product Showcase</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Sat — Story</div><div class="bg-zinc-800 rounded-3xl p-6 text-center">Sun — Teaser</div>`;
      document.getElementById('weekly-plan').innerHTML = html;
    }

    function copyCaption(el) {
      navigator.clipboard.writeText(el.textContent).then(() => {
        const orig = el.textContent;
        el.textContent = "✅ Copied!";
        setTimeout(() => el.textContent = orig, 1500);
      });
    }

    // MARKETING STRATEGIES
    function renderMarketing() {
      document.getElementById('main-content').innerHTML = `
        <div class="max-w-6xl mx-auto">
          <h2 class="text-4xl font-bold mb-8">Marketing Strategies</h2>
          <h3 class="text-2xl font-semibold mb-8">12-Month Marketing Calendar</h3>
          <div class="flex flex-wrap gap-2 mb-8 border-b border-zinc-700 pb-2 overflow-x-auto">
            <button onclick="showMonth(0)" class="tab-btn active px-6 py-2 rounded-3xl text-sm font-medium">JAN</button>
            <button onclick="showMonth(1)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">FEB</button>
            <button onclick="showMonth(2)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">MAR</button>
            <button onclick="showMonth(3)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">APR</button>
            <button onclick="showMonth(4)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">MAY</button>
            <button onclick="showMonth(5)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">JUN</button>
            <button onclick="showMonth(6)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">JUL</button>
            <button onclick="showMonth(7)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">AUG</button>
            <button onclick="showMonth(8)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">SEP</button>
            <button onclick="showMonth(9)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">OCT</button>
            <button onclick="showMonth(10)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">NOV</button>
            <button onclick="showMonth(11)" class="tab-btn px-6 py-2 rounded-3xl text-sm font-medium">DEC</button>
          </div>
          <div id="month-content" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>`;
      showMonth(0);
    }

    const calendarData = [
      [{ title: "Audit & optimise all social profiles", category: "content", budget: "$500", desc: "Complete overhaul of Instagram bio...", expected: "Professional, cohesive brand presence", kpi: "Profile completion score 100%" }, { title: "Launch 'The Craftsman's Table' behind-the-scenes Reels series", category: "content", budget: "$200", desc: "Weekly Reels showing Troy at the bench...", expected: "Build authentic brand story", kpi: "10K+ Reels views" }],
      [{ title: "Launch Google Ads campaign for engagement ring seekers", category: "advertising", budget: "$1,500", desc: "Target keywords: custom engagement ring Gold Coast...", expected: "5-10 qualified enquiries", kpi: "Cost per lead under $50" }, { title: "Valentine's Day campaign - 'Craft Your Love Story'", category: "content", budget: "$800", desc: "4-week countdown featuring real love stories...", expected: "15 Valentine's bookings", kpi: "15 bookings, 500 new followers" }],
      [{ title: "Google Reviews campaign", category: "seo", budget: "$0", desc: "Systematic collection program", expected: "50+ five-star Google reviews", kpi: "5 new reviews/month" }],
      [{ title: "Mother's Day campaign", category: "content", budget: "$1,000", desc: "Heirloom restoration stories", expected: "20 orders", kpi: "20 orders" }],
      [{ title: "Local SEO blitz", category: "seo", budget: "$300", desc: "Dominate Google Maps", expected: "Top 3 placement", kpi: "50+ reviews" }],
      [{ title: "Email marketing launch", category: "email", budget: "$100", desc: "Monthly newsletter", expected: "500 subscribers", kpi: "500 subscribers" }],
      [{ title: "Spring Engagement mega-campaign", category: "advertising", budget: "$3,000", desc: "Full-funnel campaign", expected: "30 enquiries", kpi: "30 leads" }],
      [{ title: "Collaborate with influencers", category: "partnerships", budget: "$2,000", desc: "Micro-influencer partnerships", expected: "50K+ reach", kpi: "500 new followers" }],
      [{ title: "Heirloom Revival landing page", category: "advertising", budget: "$1,000", desc: "Dedicated repair page", expected: "15 repair leads", kpi: "15 leads" }],
      [{ title: "Christmas campaign early launch", category: "content", budget: "$1,500", desc: "'Crafted With Meaning'", expected: "30 Christmas orders", kpi: "30 orders" }],
      [{ title: "Black Friday Anti-Sale", category: "advertising", budget: "$800", desc: "Anti-discount messaging", expected: "Brand differentiation", kpi: "15 premium enquiries" }],
      [{ title: "New Year campaign", category: "email", budget: "$100", desc: "'New Year, New Sparkle'", expected: "January pipeline", kpi: "15 bookings" }]
    ];

    function showMonth(index) {
      const container = document.getElementById('month-content');
      container.innerHTML = '';
      const cards = calendarData[index] || [];
      cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 rounded-3xl p-8';
        div.innerHTML = `
          <div class="flex justify-between mb-4">
            <span class="bg-teal-400 text-teal-950 px-4 py-1 rounded-3xl text-xs font-bold">${card.category}</span>
            <span class="text-amber-400 font-semibold">${card.budget}</span>
          </div>
          <h4 class="font-semibold text-xl">${card.title}</h4>
          <p class="text-zinc-400 mt-3 text-sm">${card.desc}</p>
          <p class="text-xs text-zinc-500 mt-6">Expected: ${card.expected}<br>KPI: ${card.kpi}</p>`;
        container.appendChild(div);
      });
    }

    // ANALYTICS - FULL MANUAL LOGGER
    let logs = JSON.parse(localStorage.getItem('troyContentLogs')) || [];
    function saveLogs() { localStorage.setItem('troyContentLogs', JSON.stringify(logs)); }

    function renderAnalytics() {
      let html = `<div class="max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold mb-8">📈 Analytics & Content Logger</h2>
        <div class="bg-zinc-900 rounded-3xl p-8 mb-12">
          <h3 class="font-semibold mb-6">Log New Post (manual entry)</h3>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <select id="log-platform" class="bg-zinc-800 rounded-2xl p-4"><option>Instagram</option><option>TikTok</option><option>YouTube</option><option>Facebook</option><option>Pinterest</option></select>
            <input id="log-date" type="date" value="${new Date().toISOString().split('T')[0]}" class="bg-zinc-800 rounded-2xl p-4">
            <input id="log-type" placeholder="Content Type" class="bg-zinc-800 rounded-2xl p-4">
            <input id="log-views" type="number" placeholder="Views" class="bg-zinc-800 rounded-2xl p-4">
            <input id="log-likes" type="number" placeholder="Likes" class="bg-zinc-800 rounded-2xl p-4">
            <button onclick="addLog()" class="bg-amber-400 text-zinc-950 font-semibold rounded-3xl">Log Post</button>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-6 mb-12">
          <div class="bg-zinc-900 rounded-3xl p-6"><p class="text-zinc-400">Total Posts</p><p id="total-posts" class="text-4xl font-bold">${logs.length}</p></div>
          <div class="bg-zinc-900 rounded-3xl p-6"><p class="text-zinc-400">Avg Engagement</p><p id="avg-engagement" class="text-4xl font-bold">—</p></div>
          <div class="bg-zinc-900 rounded-3xl p-6"><p class="text-zinc-400">Top Platform</p><p id="top-platform" class="text-4xl font-bold">—</p></div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-8 mb-12">
          <canvas id="performanceChart" class="w-full h-80"></canvas>
        </div>
        <h3 class="font-semibold mb-6">Content Log History</h3>
        <div id="logs-table" class="bg-zinc-900 rounded-3xl overflow-hidden"></div>
      </div>`;
      document.getElementById('main-content').innerHTML = html;
      renderLogsTable();
      renderChart();
    }

    function addLog() {
      const platform = document.getElementById('log-platform').value;
      const date = document.getElementById('log-date').value;
      const type = document.getElementById('log-type').value || "Post";
      const views = parseInt(document.getElementById('log-views').value) || 0;
      const likes = parseInt(document.getElementById('log-likes').value) || 0;
      logs.push({ platform, date, type, views, likes });
      saveLogs();
      renderAnalytics();
    }

    function renderLogsTable() {
      const container = document.getElementById('logs-table');
      let html = `<table class="w-full"><thead><tr class="border-b"><th class="text-left p-4">Date</th><th class="text-left p-4">Platform</th><th class="text-left p-4">Type</th><th class="text-right p-4">Views</th><th class="text-right p-4">Likes</th></tr></thead><tbody>`;
      logs.forEach(log => {
        html += `<tr class="border-b"><td class="p-4">${log.date}</td><td class="p-4">${log.platform}</td><td class="p-4">${log.type}</td><td class="p-4 text-right">${log.views}</td><td class="p-4 text-right">${log.likes}</td></tr>`;
      });
      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    function renderChart() {
      const ctx = document.getElementById('performanceChart');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Instagram', 'TikTok', 'YouTube', 'Facebook', 'Pinterest'],
          datasets: [{ label: 'Views', data: [1200, 800, 450, 300, 150], backgroundColor: '#fcd34d' }]
        },
        options: { scales: { y: { beginAtZero: true } } }
      });
    }

    // COST CALCULATOR
    function renderCalculator() {
      document.getElementById('main-content').innerHTML = `
        <div class="max-w-6xl mx-auto">
          <h2 class="text-4xl font-bold mb-8">🧮 Cost Calculator</h2>
          <div class="bg-zinc-900 rounded-3xl p-8 max-w-2xl mx-auto">
            <div class="space-y-6">
              <div>
                <label class="block text-sm text-zinc-400 mb-1">Metal Type</label>
                <select id="metal-type" class="w-full bg-zinc-800 rounded-2xl p-4" onchange="updateMetalPrice()">
                  <option value="18ct-yellow">18ct Yellow Gold</option>
                  <option value="18ct-white">18ct White Gold</option>
                  <option value="18ct-rose">18ct Rose Gold</option>
                  <option value="9ct-yellow">9ct Yellow Gold</option>
                  <option value="9ct-white">9ct White Gold</option>
                  <option value="9ct-rose">9ct Rose Gold</option>
                  <option value="platinum">Platinum</option>
                  <option value="silver">Silver</option>
                </select>
              </div>
              <div>
                <label class="block text-sm text-zinc-400 mb-1">Price per gram at cost ($)</label>
                <input id="metal-price" type="number" value="85" class="w-full bg-zinc-800 rounded-2xl p-4">
              </div>
              <div>
                <label class="block text-sm text-zinc-400 mb-1">Gram Weight</label>
                <input id="gram-weight" type="number" value="5" class="w-full bg-zinc-800 rounded-2xl p-4" oninput="calculateCost()">
              </div>
              <div>
                <label class="block text-sm text-zinc-400 mb-1">Labour Hours ($100/hr)</label>
                <input id="labour-hours" type="number" value="4" class="w-full bg-zinc-800 rounded-2xl p-4" oninput="calculateCost()">
              </div>
              <div>
                <label class="block text-sm text-zinc-400 mb-1">Gemstone Costs ($)</label>
                <input id="gems" type="number" value="800" class="w-full bg-zinc-800 rounded-2xl p-4" oninput="calculateCost()">
              </div>
              <div>
                <label class="block text-sm text-zinc-400 mb-1">Other Costs ($)</label>
                <input id="other" type="number" value="50" class="w-full bg-zinc-800 rounded-2xl p-4" oninput="calculateCost()">
              </div>
              <div>
                <label class="block text-sm text-zinc-400 mb-1">Margin %</label>
                <input id="margin" type="number" value="300" class="w-full bg-zinc-800 rounded-2xl p-4" oninput="calculateCost()">
              </div>
              <button onclick="calculateCost()" class="w-full bg-amber-400 text-zinc-950 font-semibold py-5 rounded-3xl text-lg">Calculate Final Price</button>
              <div id="cost-result" class="bg-zinc-800 rounded-3xl p-6 text-lg hidden"></div>
            </div>
          </div>
        </div>`;
    }

    function updateMetalPrice() {
      const type = document.getElementById('metal-type').value;
      let price = 85;
      if (type.includes('18ct')) price = 85;
      else if (type.includes('9ct')) price = 42;
      else if (type.includes('platinum')) price = 95;
      else if (type.includes('silver')) price = 1.2;
      document.getElementById('metal-price').value = price;
      calculateCost();
    }

    function calculateCost() {
      const metalPrice = parseFloat(document.getElementById('metal-price').value) || 0;
      const weight = parseFloat(document.getElementById('gram-weight').value) || 0;
      const hours = parseFloat(document.getElementById('labour-hours').value) || 0;
      const gems = parseFloat(document.getElementById('gems').value) || 0;
      const other = parseFloat(document.getElementById('other').value) || 0;
      const marginPct = parseFloat(document.getElementById('margin').value) || 300;

      const metalCost = metalPrice * weight;
      const labourCost = hours * 100;
      const totalCost = metalCost + labourCost + gems + other;
      const marginAmount = totalCost * (marginPct / 100);
      const sellingPrice = totalCost + marginAmount;
      const gst = sellingPrice * 0.1;
      const finalPrice = sellingPrice + gst;

      document.getElementById('cost-result').innerHTML = `
        <div class="space-y-2">
          <div><strong>Metal Cost:</strong> $${metalCost.toFixed(2)}</div>
          <div><strong>Labour Cost:</strong> $${labourCost.toFixed(2)}</div>
          <div><strong>Gems + Other:</strong> $${(gems + other).toFixed(2)}</div>
          <div><strong>Total Cost:</strong> $${totalCost.toFixed(2)}</div>
          <div><strong>Margin (${marginPct}%):</strong> $${marginAmount.toFixed(2)}</div>
          <div class="text-xl"><strong>Selling Price:</strong> $${sellingPrice.toFixed(2)}</div>
          <div><strong>GST (10%):</strong> $${gst.toFixed(2)}</div>
          <div class="text-3xl font-bold text-amber-400">FINAL PRICE: $${finalPrice.toFixed(2)}</div>
        </div>`;
      document.getElementById('cost-result').classList.remove('hidden');
    }

    document.getElementById('password-input').addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });
  </script>
</body>
</html>
