<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Troy Clancy Jewellery • JewelCraft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .tab-btn.active { background-color: #fcd34d; color: #111827; font-weight: 600; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- PASSWORD -->
  <div id="password-screen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-12 w-full max-w-md text-center">
      <div class="text-5xl mb-6">💎</div>
      <h1 class="text-3xl font-bold mb-2">JewelCraft Insights</h1>
      <p class="text-amber-400 mb-8">Troy Clancy Jewellery • Private</p>
      <input id="password-input" type="password" placeholder="Enter Password" class="w-full bg-zinc-800 text-center rounded-2xl p-5 text-lg mb-6">
      <button onclick="checkPassword()" class="w-full bg-amber-400 text-zinc-950 font-semibold py-5 rounded-3xl text-lg">UNLOCK DASHBOARD</button>
      <p id="error-msg" class="text-red-400 mt-4 text-sm hidden">Incorrect password</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden flex h-screen">
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-amber-400 to-yellow-600 rounded-xl flex items-center justify-center text-xl">💎</div>
          <div><h1 class="text-2xl font-bold">JewelCraft</h1><p class="text-amber-400 text-sm">Troy Clancy</p></div>
        </div>
      </div>
      <nav class="flex-1 p-4 space-y-1" id="nav"></nav>
    </div>

    <div class="flex-1 flex flex-col">
      <header class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
        <h2 id="page-title" class="text-2xl font-semibold">Dashboard</h2>
      </header>
      <div class="flex-1 overflow-auto p-8" id="main-content"></div>
    </div>
  </div>

  <!-- CLIENT MODAL -->
  <div id="client-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 w-full max-w-4xl mx-4 rounded-3xl overflow-hidden">
      <div class="px-8 py-6 border-b border-zinc-700 flex justify-between items-center">
        <h2 id="modal-client-name" class="text-3xl font-bold"></h2>
        <button onclick="closeModal()" class="text-3xl leading-none text-zinc-400 hover:text-white">×</button>
      </div>
      <div class="p-8">
        <div class="grid grid-cols-2 gap-8">
          <!-- Client Details -->
          <div>
            <h3 class="font-semibold mb-4 text-lg">Client Details</h3>
            <div id="client-details-form" class="space-y-4"></div>
            <button onclick="saveClientDetails()" class="mt-6 bg-amber-400 text-zinc-950 px-8 py-3 rounded-3xl font-semibold">Save Details</button>
          </div>

          <!-- Purchases -->
          <div>
            <div class="flex justify-between items-center mb-4">
              <h3 class="font-semibold text-lg">Purchase History</h3>
              <button onclick="addPurchase()" class="bg-emerald-400 text-zinc-950 px-5 py-2 rounded-3xl text-sm font-medium">+ Add Purchase</button>
            </div>
            <div id="purchases-list" class="space-y-4 max-h-96 overflow-auto"></div>
            <div class="mt-6 pt-6 border-t border-zinc-700">
              <p class="text-zinc-400">Lifetime Value: <span id="lifetime-value" class="text-3xl font-bold text-amber-400"></span></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CORRECT_PASSWORD = "c99#1@axWTE!NH^B";

    function checkPassword() {
      if (document.getElementById('password-input').value === CORRECT_PASSWORD) {
        document.getElementById('password-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        buildNav();
        pages.dashboard.render();
      } else {
        document.getElementById('error-msg').classList.remove('hidden');
      }
    }

    const pages = {
      dashboard: { title: "Dashboard", icon: "📊", render: renderDashboard },
      crm: { title: "Client Vault", icon: "👥", render: renderCRM },
      playbook: { title: "Outperform Playbook", icon: "🚀", render: renderPlaybook },
      marketing: { title: "Marketing Strategies", icon: "📣", render: renderMarketing },
      calculator: { title: "Cost Calculator", icon: "🧮", render: renderCalculator }
    };

    function buildNav() {
      const nav = document.getElementById('nav');
      nav.innerHTML = '';
      Object.keys(pages).forEach(key => {
        const p = pages[key];
        const el = document.createElement('div');
        el.className = `flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer hover:bg-zinc-800 ${key === 'dashboard' ? 'bg-zinc-800' : ''}`;
        el.innerHTML = `<span class="text-xl">${p.icon}</span><span>${p.title}</span>`;
        el.onclick = () => {
          document.querySelectorAll('#nav > div').forEach(d => d.classList.remove('bg-zinc-800'));
          el.classList.add('bg-zinc-800');
          document.getElementById('page-title').textContent = p.title;
          p.render();
        };
        nav.appendChild(el);
      });
    }

    function renderDashboard() {
      document.getElementById('main-content').innerHTML = `<div class="max-w-6xl mx-auto text-center py-20"><h1 class="text-5xl font-bold text-amber-400">Welcome back, Troy</h1></div>`;
    }

    // ==================== CLIENT VAULT ====================
    let clients = JSON.parse(localStorage.getItem('troyClients')) || [];
    let currentClientIndex = -1;

    function saveClients() {
      localStorage.setItem('troyClients', JSON.stringify(clients));
    }

    function renderCRM() {
      let html = `<div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-bold">Client Vault</h2>
          <button onclick="addClient()" class="bg-amber-400 text-zinc-950 px-6 py-3 rounded-3xl font-semibold">+ Add New Client</button>
        </div>`;

      if (clients.length === 0) {
        html += `<p class="text-zinc-400 text-center py-12">No clients yet. Add your first client above.</p>`;
      } else {
        html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
        clients.forEach((c, i) => {
          const total = c.purchases ? c.purchases.reduce((sum, p) => sum + (p.amount || 0), 0) : 0;
          html += `<div onclick="openClientModal(${i})" class="bg-zinc-900 rounded-3xl p-6 cursor-pointer hover:ring-2 hover:ring-amber-400 transition-all">
            <h3 class="font-semibold text-2xl">${c.name}</h3>
            <p class="text-amber-400">${c.phone || 'No phone'}</p>
            <p class="text-emerald-400 mt-4 font-medium">Lifetime Value: $${total}</p>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
      document.getElementById('main-content').innerHTML = html;
    }

    function addClient() {
      const name = prompt("New Client Full Name:");
      if (name) {
        clients.push({
          name,
          phone: "",
          email: "",
          address: "",
          birthday: "",
          weddingAnniversary: "",
          notes: "",
          purchases: []
        });
        saveClients();
        renderCRM();
      }
    }

    function openClientModal(i) {
      currentClientIndex = i;
      const client = clients[i];
      document.getElementById('modal-client-name').textContent = client.name;

      // Details form
      let detailsHTML = `
        <div class="grid grid-cols-2 gap-4">
          <div><label class="text-xs text-zinc-400">Phone</label><input id="modal-phone" value="${client.phone || ''}" class="w-full bg-zinc-800 rounded-2xl p-3"></div>
          <div><label class="text-xs text-zinc-400">Email</label><input id="modal-email" value="${client.email || ''}" class="w-full bg-zinc-800 rounded-2xl p-3"></div>
          <div class="col-span-2"><label class="text-xs text-zinc-400">Address</label><input id="modal-address" value="${client.address || ''}" class="w-full bg-zinc-800 rounded-2xl p-3"></div>
          <div><label class="text-xs text-zinc-400">Birthday</label><input id="modal-birthday" type="date" value="${client.birthday || ''}" class="w-full bg-zinc-800 rounded-2xl p-3"></div>
          <div><label class="text-xs text-zinc-400">Wedding Anniversary</label><input id="modal-anniversary" type="date" value="${client.weddingAnniversary || ''}" class="w-full bg-zinc-800 rounded-2xl p-3"></div>
        </div>
        <div class="mt-6"><label class="text-xs text-zinc-400">Notes</label><textarea id="modal-notes" class="w-full bg-zinc-800 rounded-3xl p-4 h-24">${client.notes || ''}</textarea></div>
      `;
      document.getElementById('client-details-form').innerHTML = detailsHTML;

      // Purchases
      renderPurchasesList();

      document.getElementById('client-modal').classList.remove('hidden');
    }

    function renderPurchasesList() {
      const client = clients[currentClientIndex];
      const container = document.getElementById('purchases-list');
      let html = '';

      if (!client.purchases || client.purchases.length === 0) {
        html = `<p class="text-zinc-400 text-center py-8">No purchases yet</p>`;
      } else {
        client.purchases.forEach((p, idx) => {
          html += `
            <div class="bg-zinc-800 rounded-3xl p-5 flex gap-5">
              ${p.photoURL ? `<img src="${p.photoURL}" class="w-20 h-20 object-cover rounded-2xl flex-shrink-0" alt="purchase">` : `<div class="w-20 h-20 bg-zinc-700 rounded-2xl flex items-center justify-center text-3xl">💍</div>`}
              <div class="flex-1">
                <div class="flex justify-between">
                  <h4 class="font-semibold">${p.item}</h4>
                  <span class="text-emerald-400 font-medium">$${p.amount}</span>
                </div>
                <p class="text-xs text-zinc-400">${p.date} • ${p.metal || ''}</p>
                <p class="text-sm text-zinc-300 mt-1">${p.notes || ''}</p>
              </div>
              <button onclick="deletePurchase(${idx}); event.stopImmediatePropagation()" class="text-red-400 text-xl">×</button>
            </div>`;
        });
      }
      container.innerHTML = html;

      // Lifetime value
      const total = client.purchases ? client.purchases.reduce((sum, p) => sum + (Number(p.amount) || 0), 0) : 0;
      document.getElementById('lifetime-value').textContent = `$${total}`;
    }

    function addPurchase() {
      const client = clients[currentClientIndex];
      const item = prompt("Item purchased (e.g. Custom Engagement Ring):");
      if (!item) return;

      const date = prompt("Date (YYYY-MM-DD):", "2025-05-08");
      const amount = parseFloat(prompt("Amount spent ($):"));
      const photoURL = prompt("Photo URL (paste image link):");
      const metal = prompt("Metal type (18k Yellow Gold, Platinum, etc.):");
      const notes = prompt("Notes / description:");

      if (!client.purchases) client.purchases = [];
      client.purchases.push({
        item,
        date: date || new Date().toISOString().split('T')[0],
        amount: amount || 0,
        photoURL: photoURL || "",
        metal: metal || "",
        notes: notes || ""
      });

      saveClients();
      renderPurchasesList();
    }

    function deletePurchase(idx) {
      if (confirm("Delete this purchase?")) {
        clients[currentClientIndex].purchases.splice(idx, 1);
        saveClients();
        renderPurchasesList();
      }
    }

    function saveClientDetails() {
      const client = clients[currentClientIndex];
      client.phone = document.getElementById('modal-phone').value;
      client.email = document.getElementById('modal-email').value;
      client.address = document.getElementById('modal-address').value;
      client.birthday = document.getElementById('modal-birthday').value;
      client.weddingAnniversary = document.getElementById('modal-anniversary').value;
      client.notes = document.getElementById('modal-notes').value;

      saveClients();
      alert("✅ Client details saved!");
    }

    function closeModal() {
      document.getElementById('client-modal').classList.add('hidden');
      currentClientIndex = -1;
      renderCRM();
    }

    // ==================== Other sections (unchanged) ====================
    function renderPlaybook() { /* same as before */ 
      document.getElementById('main-content').innerHTML = `... (Playbook code same as previous version) ...`;
    } // (kept short for space - full version is in previous code)

    function renderMarketing() { /* full 12-month tabs - unchanged */ 
      // (same full marketing code from the last version you have)
      document.getElementById('main-content').innerHTML = `... (Marketing tabs code) ...`;
    }

    function renderCalculator() {
      document.getElementById('main-content').innerHTML = `<div class="max-w-6xl mx-auto text-center py-20"><h2 class="text-4xl font-bold">🧮 Cost Calculator</h2><p class="mt-8 text-xl">300% margin + 10% GST + $350/hr labour</p></div>`;
    }

    // Keyboard support
    document.getElementById('password-input').addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });
  </script>
</body>
</html>
